services:
  postgres:
    image: postgres:16-alpine
    container_name: monzer-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: monzer
      POSTGRES_PASSWORD: monzer_dev_password
      POSTGRES_DB: monzer
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
